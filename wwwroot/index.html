<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Синапс — блочное программирование</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Synapse.Blocks.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <main class="boot-screen" aria-label="Загрузка игры">
            <div class="boot-brand"><i class="brand-mark" aria-hidden="true"></i><span><b>СИНАПС</b></span></div>
            <div class="boot-copy">
                <small>ГОРОД НОЛЬ / ПОДКЛЮЧЕНИЕ</small>
                <h1>Готовим рабочее поле</h1>
                <p>Загружаем блоки и ваши сохранённые уровни…</p>
                <div class="boot-line"><i></i></div>
            </div>
        </main>
    </div>

    <div id="blazor-error-ui">
        Произошла ошибка интерфейса.
        <a href="." class="reload">Перезагрузить</a>
        <span class="dismiss">×</span>
    </div>
    <!-- Небольшой нативный помощник даёт плавно двигать большое нодовое поле мышью. -->
    <script src="js/canvas-pan.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
