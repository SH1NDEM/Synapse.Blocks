name: Публикация игры

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Получение файлов
        uses: actions/checkout@v6

      - name: Установка .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Сборка игры
        shell: bash
        run: |
          PROJECT=$(find . -name "Synapse.Blocks.csproj" -not -path "*/bin/*" -not -path "*/obj/*" | head -n 1)
          dotnet publish "$PROJECT" -c Release -o release

      - name: Подготовка для GitHub Pages
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/$REPO_NAME/"
          fi

          sed -i "s|<base href=\"/\" />|<base href=\"$BASE_PATH\" />|" release/wwwroot/index.html
          cp release/wwwroot/index.html release/wwwroot/404.html
          touch release/wwwroot/.nojekyll

      - name: Настройка Pages
        uses: actions/configure-pages@v5

      - name: Загрузка сайта
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Публикация
        id: deployment
        uses: actions/deploy-pages@v4
